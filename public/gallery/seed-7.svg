<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1000" viewBox="0 0 1200 1000" role="img" aria-label="Photo coming soon" style="--red:#d81f26">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8f9"/>
      <stop offset="1" stop-color="#e7e9ec"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1000" fill="url(#bg)"/>
  <!-- glass reflection bands -->
  <g opacity="0.7">
    <rect x="144" y="-20" width="192" height="1040" fill="url(#glass)" transform="skewX(-12)"/>
    <rect x="660" y="-20" width="120" height="1040" fill="url(#glass)" transform="skewX(-12)"/>
  </g>
  <!-- thin frame -->
  <rect x="6" y="6" width="1188" height="988" rx="6" fill="none" stroke="#11111422" stroke-width="2"/>
  <!-- red corner accent -->
  <rect x="6" y="986" width="384" height="4" fill="var(--red)"/>
  <!-- mark -->
  <g transform="translate(576,476) scale(1)" opacity="0.9">
     <path d="M0,30 L8,12 L13,20 L21,4 L29,18 L37,10 L48,30 Z" fill="#11111e"/>
     <path d="M18,9 L21,4 L24,9 Z" fill="var(--red)"/>
   </g>
  <text x="600" y="526" text-anchor="middle" font-family="Archivo, sans-serif" font-weight="800" font-size="14" letter-spacing="2" fill="#11111e" opacity="0.55">RIGID</text>
  <text x="600" y="974" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#44464d" opacity="0.6">Photo coming soon</text>
</svg>