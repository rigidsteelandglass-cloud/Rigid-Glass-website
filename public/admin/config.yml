# ============================================================================
#  Noah's Showers — Content dashboard settings
#  This controls the "Manage Photos" dashboard at /admin.
#  After creating the GitHub repo, set `repo:` below to:  <github-username>/<repo>
# ============================================================================

backend:
  name: github
  repo: CHANGE-ME/noahs-showers # <-- e.g. noah-builds/noahs-showers
  branch: main
  # Auth is handled by Netlify's built-in GitHub OAuth provider (no extra
  # server needed). See SETUP.md → "Turn on the photo dashboard".

# Where uploaded photos are stored in the repo, and how the site links them.
media_folder: 'public/images/uploads'
public_folder: '/images/uploads'

# Friendly UI touches
site_url: https://noahs-showers.netlify.app
display_url: https://noahs-showers.netlify.app
logo_url: /favicon.svg

collections:
  - name: projects
    label: Projects
    label_singular: Project
    description: 'Each project is one job. Add photos, a title, and a short description.'
    folder: src/content/projects
    create: true
    delete: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    summary: '{{title}}  ·  {{location}}'
    sortable_fields: [order, date, title]
    view_groups:
      - { label: 'Featured', field: featured }
    fields:
      - { name: title, label: 'Project title', widget: string, hint: 'e.g. Walk-in tile shower' }
      - { name: location, label: 'Location', widget: string, required: false, hint: 'City or neighborhood (optional)' }
      - {
          name: date,
          label: 'Date completed',
          widget: datetime,
          date_format: 'YYYY-MM-DD',
          time_format: false,
          format: 'YYYY-MM-DD',
        }
      - {
          name: summary,
          label: 'Short description',
          widget: text,
          hint: 'One or two sentences — shown on the project card.',
        }
      - { name: coverImage, label: 'Main photo', widget: image, hint: 'The cover photo people see first.' }
      - {
          name: gallery,
          label: 'More photos',
          widget: list,
          required: false,
          field: { name: image, label: 'Photo', widget: image },
          hint: 'Add as many extra photos as you like.',
        }
      - {
          name: featured,
          label: 'Show on home page?',
          widget: boolean,
          default: false,
        }
      - {
          name: order,
          label: 'Sort order',
          widget: number,
          default: 0,
          required: false,
          value_type: int,
          hint: 'Lower numbers show first. Leave at 0 to sort newest-first.',
        }
      - {
          name: body,
          label: 'Details (optional)',
          widget: markdown,
          required: false,
          hint: 'Any extra story about the job. Can be left blank.',
        }
