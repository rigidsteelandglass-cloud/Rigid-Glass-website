# Netlify build settings for the Astro site.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Cache gallery photos aggressively (filenames are stable / content-hashed).
[[headers]]
  for = "/gallery/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
